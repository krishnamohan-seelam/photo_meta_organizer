[pytest]
# Pytest configuration for Photo Meta Organizer

# Test discovery
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    --cov=photo_meta_organizer
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml
    --strict-markers
    -v

# Coverage options
[coverage:run]
branch = True
omit =
    */tests/*
    */site-packages/*
    */__pycache__/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if TYPE_CHECKING:
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    @abstractmethod
    @abc.abstractmethod
